services:
  # Laravel Web Application
  - type: web
    name: laravel-app
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free          # Change to 'starter' or higher for production
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: Laravel
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: APP_URL
        fromService:
          type: web
          name: laravel-app
          property: host
      - key: APP_KEY
        generateValue: true   # Render auto-generates a secure value

      # Database — links to the PostgreSQL service below
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: laravel-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: laravel-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: laravel-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: laravel-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: laravel-db
          property: password

      # Cache & Session
      - key: CACHE_DRIVER
        value: file
      - key: SESSION_DRIVER
        value: file
      - key: QUEUE_CONNECTION
        value: sync

      # Mail (update with your mail provider)
      - key: MAIL_MAILER
        value: smtp
      - key: MAIL_HOST
        value: smtp.mailtrap.io
      - key: MAIL_PORT
        value: "2525"
      - key: MAIL_USERNAME
        sync: false     # Set manually in Render dashboard
      - key: MAIL_PASSWORD
        sync: false     # Set manually in Render dashboard
      - key: MAIL_FROM_ADDRESS
        value: hello@example.com
      - key: MAIL_FROM_NAME
        value: Laravel

databases:
  # PostgreSQL Database
  - name: laravel-db
    plan: free          # Change to 'starter' for production (free plan has 90-day limit)
    databaseName: laravel
    user: laravel
